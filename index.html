<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Question...</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(#090010,#170022,#32002e);

color:white;

}

/* Moon */

.moon{

position:absolute;
top:70px;
right:80px;

width:130px;
height:130px;

border-radius:50%;

background:#f7f2ff;

box-shadow:
0 0 40px white,
0 0 80px #b67fff;

animation:moonGlow 3s infinite alternate;

}

@keyframes moonGlow{

from{
box-shadow:0 0 30px white;
}

to{
box-shadow:0 0 80px #ff3b93;
}

}

/* Clouds */

.cloud{

position:absolute;

background:rgba(255,255,255,.08);

border-radius:50px;

filter:blur(4px);

animation:cloud 45s linear infinite;

}

.cloud:nth-child(2){

top:90px;
left:-250px;

width:240px;
height:70px;

}

.cloud:nth-child(3){

top:180px;
left:-350px;

width:330px;
height:90px;

animation-duration:60s;

}

@keyframes cloud{

from{

transform:translateX(0);

}

to{

transform:translateX(180vw);

}

}

/* bats */

.bat{

position:absolute;

font-size:30px;

animation:fly linear infinite;

opacity:.75;

}

@keyframes fly{

0%{

transform:translate(-10vw,110vh) rotate(0);

}

100%{

transform:translate(110vw,-20vh) rotate(360deg);

}

}

/* card */

.card{

background:rgba(15,10,20,.85);

padding:40px;

border-radius:24px;

width:min(90%,420px);

text-align:center;

border:1px solid #ff3b93;

box-shadow:

0 0 20px #ff3b93;

backdrop-filter:blur(8px);

}

.icon{

font-size:80px;

margin-bottom:15px;

animation:float 2.5s infinite;

}

@keyframes float{

50%{

transform:translateY(-10px);

}

}

h1{

font-family:Cinzel,serif;

color:#ffd6ec;

margin-bottom:15px;

}

p{

margin-bottom:30px;

color:#ddd;

}

.buttons{

position:relative;

height:160px;

}

button{

padding:15px 34px;

font-size:20px;

border:none;

border-radius:40px;

cursor:pointer;

transition:.3s;

}

#yes{

background:#ff3b93;

color:white;

box-shadow:0 0 20px #ff3b93;

}

#yes:hover{

transform:scale(1.08);

}

#no{

position:absolute;

background:#111;

color:white;

border:2px solid #ff3b93;

left:210px;

top:0;

}

#result{

display:none;

font-size:20px;

line-height:1.7;

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;
transform:scale(.8);

}

to{

opacity:1;
transform:scale(1);

}

}

/* mobile */

@media(max-width:600px){

.card{

padding:30px 20px;

}

#no{

left:150px;

}

.moon{

width:90px;
height:90px;
right:20px;

}

}

</style>

</head>

<body>

<!-- optional music -->
<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="moon"></div>

<div class="cloud"></div>
<div class="cloud"></div>

<div class="card">

<div class="icon">🦇</div>

<h1 id="title">wanna go for a date ?</h1>

<p id="question">
say yes neko 🖤
</p>

<div class="buttons" id="buttons">

<button id="yes">
Yes 🖤
</button>

<button id="no">
No
</button>

</div>

<div id="result">

<h2>🖤</h2>

<p id="type"></p>

</div>

</div>

<script>

const texts=[
"Really? 🥺",
"Think again 🖤",
"Pretty please 🥀",
"No isn't allowed 😈",
"Come on ❤️"
];

let i=0;

const no=document.getElementById("no");

function move(){

if(i<texts.length){

no.innerHTML=texts[i];
i++;

}

const x=Math.random()*220;

const y=Math.random()*110;

no.style.left=x+"px";

no.style.top=y+"px";

}

no.addEventListener("mouseover",move);

no.addEventListener("click",move);

document.getElementById("yes").onclick=function(){

document.getElementById("buttons").style.display="none";

document.getElementById("title").innerHTML="You Chose yes ";

document.getElementById("question").style.display="none";

document.getElementById("result").style.display="block";

const text=
"From this moment on,i will keep u stay out form ur boresom. 🖤\n\n kepp in thoch tho  🌙🥀";

let j=0;

function type(){

if(j<text.length){

document.getElementById("type").innerHTML+=text.charAt(j);

j++;

setTimeout(type,35);

}

}

type();

};

function bat(){

const b=document.createElement("div");

b.className="bat";

b.innerHTML="🦇";

b.style.left="-10vw";

b.style.top=Math.random()*90+"vh";

b.style.animationDuration=(8+Math.random()*8)+"s";

b.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(b);

setTimeout(()=>{

b.remove();

},16000);

}

setInterval(bat,1200);

</script>

</body>
</html>
