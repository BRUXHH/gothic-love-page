<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Question ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
position:relative;
z-index:2;
}

.bear{
font-size:90px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

h1{
font-size:2.2rem;
color:#ff4d88;
margin:20px;
animation:float 2s infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.buttons{
margin-top:25px;
position:relative;
height:180px;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:40px;
cursor:pointer;
transition:.25s;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

#yes{
background:#ff4d88;
color:white;
margin-right:20px;
animation:pulse 1.4s infinite;
}

@keyframes pulse{
50%{transform:scale(1.08);}
}

#no{
background:white;
color:#ff4d88;
position:absolute;
}

#result{
display:none;
font-size:2rem;
color:#ff4d88;
animation:pop .8s;
}

@keyframes pop{
from{transform:scale(.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.heart{
position:absolute;
font-size:24px;
animation:rise 6s linear infinite;
opacity:.8;
}

@keyframes rise{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
20%{opacity:1;}
100%{
transform:translateY(-120vh) scale(1.4);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">

<div class="bear">🧸</div>

<h1 id="question">
Will you go on a date with me? 🥺❤️
</h1>

<div class="buttons" id="buttons">

<button id="yes">Yes 💖</button>

<button id="no">No 🙈</button>

</div>

<div id="result">
🎉 YAYYY!! ❤️<br><br>
You just made my day 🥹💕
</div>

</div>

<script>

const no=document.getElementById("no");
const buttons=document.getElementById("buttons");

const texts=[
"Are you sure? 🥺",
"Think again 💕",
"Please? 🌸",
"One more chance 🥹",
"I'll buy snacks 🍫",
"Pretty please ❤️"
];

let count=0;

no.addEventListener("click",move);
no.addEventListener("mouseover",move);

function move(){

count++;

if(count<texts.length){
no.innerHTML=texts[count];
}

const x=Math.random()*250;
const y=Math.random()*120;

no.style.left=x+"px";
no.style.top=y+"px";
}

document.getElementById("yes").onclick=function(){

document.getElementById("question").style.display="none";
buttons.style.display="none";
document.getElementById("result").style.display="block";

setInterval(createHeart,120);

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=Math.random()>0.5?"❤️":"💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

</script>

</body>
</html>
